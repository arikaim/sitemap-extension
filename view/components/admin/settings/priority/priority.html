{% set priority = 1.0 %}      
<select 
    class="{{ theme.form.select }} {{ class }} priority-dropdown" 
    id="priority_dropdown">
    {% for item in 1..11 %}                   
        <option 
            {% set priority = priority|number_format(1,'.') %}
            {{ (selected == priority) ? 'selected' : '' }}
            value="{{ priority }}">                          
            {{ priority }}
        </option>       
        {% set priority = priority - 0.1 %}         
    {% endfor %}            
</select>
